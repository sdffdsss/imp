---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: oss-imp-unicom
  name: oss-imp-unicom
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: oss-imp-unicom
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: oss-imp-unicom
    spec:
      containers:
        - image: harbor.dcos.ncmp.unicom.local/znjk/oss-imp-unicom:#{Build.BuildNumber}#
          imagePullPolicy: Always
          name: oss-imp-unicom
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /opt/nginx/conf/nginx.conf
              name: oss-imp-unicom-configmap
              subPath: nginx.conf
            - mountPath: /opt/nginx/logs
              name: oss-imp-unicom-log-volume
          workingDir: /opt/nginx/html
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            items:
              - key: oss-imp-unicom-configmap
                path: nginx.conf
            name: oss-imp-unicom-configmap
          name: oss-imp-unicom-configmap
        - hostPath:
            path: /var/lib/docker/log/473794717781-znjktest/default-group/ oss-imp-unicom
            type: ''
          name: oss-imp-unicom-log-volume
